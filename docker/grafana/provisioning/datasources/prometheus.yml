# ==============================================================================
# Grafana 데이터 소스 자동 등록
# 참고: https://grafana.com/docs/grafana/latest/administration/provisioning/#data-sources
# ==============================================================================
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
