# ==============================================================================
# Grafana 대시보드 provider — /var/lib/grafana/dashboards 안의 JSON을 자동 로딩
# 참고: https://grafana.com/docs/grafana/latest/administration/provisioning/#dashboards
# ==============================================================================
apiVersion: 1

providers:
  - name: "redis-learning"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
