# ==============================================================================
# Redis AOF 실습 전용 설정 파일
# ------------------------------------------------------------------------------
# 기본 redis.conf 와의 차이만 정리:
#   - appendonly yes               : AOF 활성화 (기본 conf는 no)
#   - appendfsync everysec         : 1초마다 fsync (default 권장값)
#   - auto-aof-rewrite-* 활성       : 자동 재작성 트리거
#   - aof-use-rdb-preamble yes     : 새 base 파일을 RDB 형식으로 (혼합 모드)
#
# 사용법 (한 인스턴스만 AOF 켜고 싶을 때):
#   docker run -d --name redis-aof \
#     -p 127.0.0.1:6391:6379 \
#     -v $(pwd)/docker/redis/conf/redis-aof.conf:/usr/local/etc/redis/redis.conf:ro \
#     -v $(pwd)/docker/redis/data-aof:/data \
#     redis:8.6-alpine \
#     redis-server /usr/local/etc/redis/redis.conf
#
#   # 실습: SET 몇 개 → 강제 종료 → 재시작 → 데이터 살아있는지
#   redis-cli -p 6391 SET aofkey "survive"
#   docker kill -s SIGKILL redis-aof
#   docker start redis-aof
#   redis-cli -p 6391 GET aofkey   # "survive"
#
# 또는 기존 redis-cli에서 동적으로:
#   redis-cli CONFIG SET appendonly yes
#   redis-cli CONFIG REWRITE     (옵션, conf 파일에 반영)
#
# 출처: https://redis.io/docs/latest/operate/oss_and_stack/management/persistence/#append-only-file
# ==============================================================================


# ─────────────────────────────────────────────────────────────────────────────
# 네트워크 / 일반 (기본 conf와 동일)
# ─────────────────────────────────────────────────────────────────────────────
bind 0.0.0.0 -::*
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

daemonize no
loglevel notice
logfile ""
databases 16


# ─────────────────────────────────────────────────────────────────────────────
# RDB — AOF 와 함께 켜둠 (혼합 모드의 기반)
# ─────────────────────────────────────────────────────────────────────────────
save 3600 1 300 100 60 10000
stop-writes-on-bgsave-error no
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data


# ─────────────────────────────────────────────────────────────────────────────
# AOF (이 conf의 핵심)
# ─────────────────────────────────────────────────────────────────────────────

# AOF 활성화
appendonly yes

# fsync 정책:
#   always   = 모든 쓰기 명령마다 fsync — 가장 안전, 성능 손해 큼
#   everysec = 1초마다 (권장 기본값, 사고 시 최대 1초 손실)
#   no       = OS에 위임 — 가장 빠름, 사고 시 손실 가장 큼
#
# 학습용으로 다른 값을 시험해보려면 CONFIG SET appendfsync ... 로 동적 변경 가능.
appendfsync everysec

# AOF 자동 재작성 트리거
#   - 마지막 rewrite 후 size가 100% 증가 (= 두 배가 되면)
#   - 단, AOF 크기가 64MB 이상일 때만
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Redis 7+ multi-part AOF 디렉토리명
appenddirname "appendonlydir"

# 새 base 파일을 RDB 형식으로 작성 (binary, 빠른 로딩)
# 그 위에 incr 파일은 일반 명령 텍스트
aof-use-rdb-preamble yes

# AOF 로딩 중 일부 명령 실행 (옵션, 7+ 기본 yes 권장)
aof-load-truncated yes


# ─────────────────────────────────────────────────────────────────────────────
# 메모리 (기본 conf와 동일)
# ─────────────────────────────────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5


# ─────────────────────────────────────────────────────────────────────────────
# 슬로우 로그 / 알림 (기본 conf와 동일)
# ─────────────────────────────────────────────────────────────────────────────
slowlog-log-slower-than 1000
slowlog-max-len 128
notify-keyspace-events "KEA"
