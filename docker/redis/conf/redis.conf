# ==============================================================================
# Redis 학습용 설정 파일 (redis.conf)
# ==============================================================================
# 대상: Redis 8.6.x (Open Source)
# 목적: 학습 친화적인 최소 설정. "이 옵션이 왜 있는가"를 한국어 주석으로 설명.
# 출처: 공식 self-documented 예제
#       - https://github.com/redis/redis/blob/8.6/redis.conf
#       - https://redis.io/docs/latest/operate/oss_and_stack/management/config/
#
# 운영 환경에서는 절대 이 파일 그대로 쓰지 말고, 위 공식 예시를 참고해 보안·성능
# 옵션을 다시 조정하라. 이 파일은 "학습용 단일 노드"에 최적화돼 있다.
# ==============================================================================


# ─────────────────────────────────────────────────────────────────────────────
# 1. 네트워크 (Network)
# ─────────────────────────────────────────────────────────────────────────────

# bind: Redis가 listen 할 인터페이스.
#   - 0.0.0.0 = 모든 네트워크 인터페이스 (학습 컨테이너 내부에서는 안전)
#   - 호스트 포트는 docker-compose.yml에서 127.0.0.1:6379 로만 바인드하므로
#     컨테이너 밖(인터넷)에서는 접근 불가.
# 참고: https://redis.io/docs/latest/operate/oss_and_stack/management/security/#network-security
bind 0.0.0.0 -::*

# protected-mode: bind 가 0.0.0.0 이고 패스워드가 없으면 Redis가 자동으로
# "protected mode"로 진입해 외부 접속을 거부한다 (사고 방지 안전장치).
# 학습용으로는 yes 유지를 권장. 원격에서 붙어야 한다면 requirepass 또는 ACL을 쓰자.
# 참고: https://redis.io/docs/latest/operate/oss_and_stack/management/security/#protected-mode
protected-mode yes

# 클라이언트 포트
port 6379

# TCP backlog: 동시 연결 백로그 큐. 리눅스 커널의 somaxconn보다 작거나 같아야 함.
# 학습 환경에서는 기본 511 그대로 둔다.
tcp-backlog 511

# 유휴 클라이언트 타임아웃 (0 = 무제한). 학습 중에는 끊기면 헷갈리므로 0 권장.
timeout 0

# TCP keepalive (초). 0이 아니면 죽은 연결 감지를 OS에 위임.
tcp-keepalive 300


# ─────────────────────────────────────────────────────────────────────────────
# 2. 일반 (General)
# ─────────────────────────────────────────────────────────────────────────────

# 데몬화 여부. Docker에서는 PID 1로 떠야 하므로 반드시 no.
daemonize no

# 로그 레벨: debug | verbose | notice | warning
# 학습 중에는 notice가 적당. 더 보고 싶으면 verbose.
loglevel notice

# 로그 파일. 빈 문자열이면 stdout (docker logs로 보임).
logfile ""

# 사용할 데이터베이스 개수 (SELECT 0 ~ 15)
# 학습 단계에서는 0번만 쓰는 것이 권장이지만, 격리 실습용으로 16개 유지.
databases 16

# 시작 로고 출력. 학습용으로 켜두면 PORT/PID/모드 정보 보기 편하다.
always-show-logo no


# ─────────────────────────────────────────────────────────────────────────────
# 3. 영속성 - RDB 스냅샷 (RDB Persistence)
# ─────────────────────────────────────────────────────────────────────────────
# Redis는 두 가지 방식으로 데이터를 디스크에 보존한다.
#   (1) RDB: 일정 주기로 메모리 전체를 .rdb 파일로 스냅샷
#   (2) AOF: 모든 쓰기 명령을 append-only 로그에 기록
# 둘 다 켤 수 있고, Redis 8.x에서는 "혼합(Hybrid) 모드"가 기본 권장이다.
# 참고: https://redis.io/docs/latest/operate/oss_and_stack/management/persistence/

# save <초> <변경키수>: M초 동안 N개 키 이상 변경되면 BGSAVE.
# 기본값을 그대로 두되 학습용으로 좀 더 자주 떠뜨려서 .rdb 생성 확인이 쉽도록 함.
#   - 3600초(1시간) 동안 1개 변경
#   - 300초(5분) 동안 100개 변경
#   - 60초 동안 10000개 변경
save 3600 1 300 100 60 10000

# RDB 저장이 실패할 때 STOP-WRITES (yes) vs 그냥 진행 (no)
# 학습용으론 no 가 편하다 (디스크 가득 차도 명령은 받게).
stop-writes-on-bgsave-error no

# RDB 파일 압축 / 체크섬
rdbcompression yes
rdbchecksum yes

# RDB 파일명과 저장 위치 (컨테이너 내부 경로; 호스트의 ./redis/data 와 매핑됨)
dbfilename dump.rdb
dir /data


# ─────────────────────────────────────────────────────────────────────────────
# 4. 영속성 - AOF (Append-Only File)
# ─────────────────────────────────────────────────────────────────────────────
# 기본 학습용에서는 AOF를 끈 상태로 시작한다.
# AOF 실습을 할 때는 docker/docker-compose.aof.yml 또는 별도 conf로 전환한다.
# 참고: https://redis.io/docs/latest/operate/oss_and_stack/management/persistence/#append-only-file

appendonly no

# AOF가 켜져 있을 때 fsync 정책:
#   always   = 매 쓰기 명령마다 fsync (가장 안전, 성능 손해 큼)
#   everysec = 1초마다 fsync (권장 기본값, 사고 시 최대 1초 손실)
#   no       = OS에 위임 (가장 빠름, 사고 시 손실 가장 큼)
appendfsync everysec

# AOF 재작성 트리거 (크기 / 비율). 학습용으론 default 유지.
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Redis 7+ 부터는 AOF가 여러 파일(베이스 + incr)로 분할된다.
# appenddirname 으로 디렉토리명 지정.
appenddirname "appendonlydir"


# ─────────────────────────────────────────────────────────────────────────────
# 5. 메모리 관리 (Memory Management)
# ─────────────────────────────────────────────────────────────────────────────

# maxmemory: Redis가 사용할 수 있는 최대 메모리. 0 = 제한 없음.
# 학습용으로는 256MB 정도면 충분. 도커 호스트 메모리에 비해 너무 크게 잡지 말 것.
maxmemory 256mb

# maxmemory-policy: 메모리가 가득 찼을 때 어떤 키를 먼저 버릴지.
#   noeviction      = 새 쓰기 거부 (기본)
#   allkeys-lru     = 모든 키 중 LRU 제거
#   allkeys-lfu     = 모든 키 중 LFU 제거
#   allkeys-random  = 무작위
#   volatile-lru    = TTL 있는 키 중 LRU
#   volatile-lfu    = TTL 있는 키 중 LFU
#   volatile-random = TTL 있는 키 중 무작위
#   volatile-ttl    = 만료 임박한 키 우선
#   volatile-lrm    = (Redis 8.6+) TTL 있는 키 중 가장 최근에 modify 안 된 것
#   allkeys-lrm     = (Redis 8.6+) 모든 키 중 가장 최근에 modify 안 된 것
# 캐시로 쓸 거면 allkeys-lru 가 무난.
# 참고: https://redis.io/docs/latest/operate/oss_and_stack/management/eviction/
maxmemory-policy allkeys-lru

# LRU 샘플 크기. 5가 기본, 10이 더 정확하지만 약간 느림.
maxmemory-samples 5


# ─────────────────────────────────────────────────────────────────────────────
# 6. Keyspace Notifications (이벤트)
# ─────────────────────────────────────────────────────────────────────────────
# 키가 만료되거나 변경될 때 Pub/Sub 채널로 이벤트를 발행하는 기능.
# 학습용으로 모두 켜둔다 (KEA = Keyspace + Keyevent + All commands).
# 참고: https://redis.io/docs/latest/develop/use/keyspace-notifications/
notify-keyspace-events "KEA"


# ─────────────────────────────────────────────────────────────────────────────
# 7. 슬로우 로그 (Slow Log)
# ─────────────────────────────────────────────────────────────────────────────
# 명령 실행 시간이 임계치(마이크로초)를 넘으면 SLOWLOG에 기록.
# 학습 환경에선 1ms(1000us) 정도로 낮춰두면 무거운 명령이 잘 잡힌다.
slowlog-log-slower-than 1000
slowlog-max-len 128


# ─────────────────────────────────────────────────────────────────────────────
# 8. 자료구조 인코딩 임계값 (Data Structure Encoding Thresholds)
# ─────────────────────────────────────────────────────────────────────────────
# Redis는 같은 외부 자료형이라도 크기/요소 수에 따라 내부 인코딩을 바꾼다.
# 임계값 이하: listpack(촘촘한 바이트 배열, 메모리 절약, O(N) 탐색)
# 임계값 초과: hashtable / quicklist / skiplist 등 (메모리 더 쓰지만 O(1)/O(log N))
# 이 값들은 OBJECT ENCODING <key> 명령으로 실제 인코딩을 확인할 수 있다.
# 참고: https://redis.io/docs/latest/commands/object-encoding/
#       https://github.com/redis/redis/blob/8.6/redis.conf

# Hash
hash-max-listpack-entries 128
hash-max-listpack-value 64

# List
# list-max-listpack-size: -2 = 한 노드 당 8KB (기본). -1=4KB, -3=16KB, -4=32KB, -5=64KB.
#                        양수 N 이면 한 노드에 N개 요소.
list-max-listpack-size -2
# list-compress-depth: quicklist 양 끝에서 N 개 노드를 제외한 중간 노드를 LZF 압축.
#                      0 = 압축 안 함 (기본).
list-compress-depth 0

# Set
set-max-intset-entries 512
set-max-listpack-entries 128
set-max-listpack-value 64

# Sorted Set
zset-max-listpack-entries 128
zset-max-listpack-value 64

# HyperLogLog 희소 인코딩 임계 (바이트)
hll-sparse-max-bytes 3000

# Stream
stream-node-max-bytes 4096
stream-node-max-entries 100


# ─────────────────────────────────────────────────────────────────────────────
# 9. Active Defragmentation (선택)
# ─────────────────────────────────────────────────────────────────────────────
# jemalloc 단편화가 심해지면 백그라운드로 메모리 압축 시도.
# 학습용으론 끄고, 자료구조/메모리 챕터에서 별도 실습으로 켜본다.
# 참고: https://redis.io/docs/latest/operate/oss_and_stack/management/optimization/memory-optimization/
activedefrag no


# ─────────────────────────────────────────────────────────────────────────────
# 10. 보안 (Security) - 학습용 최소 설정
# ─────────────────────────────────────────────────────────────────────────────
# 학습 단계에서는 인증을 끄고 진행한다 (loopback 바인드라 안전).
# 인증 실습 챕터에서 requirepass / ACL을 다룬다.
# 참고: https://redis.io/docs/latest/operate/oss_and_stack/management/security/acl/

# requirepass <password>     # AUTH 명령 활성화 (실습 챕터에서 사용)
# user default on nopass ~* &* +@all   # 기본 ACL 사용자

# 위험한 명령을 학습 환경에서 보호하고 싶다면 rename-command 사용 가능.
# 단, 학습용으로는 풀어두는 편이 모든 명령을 실험하기 편하다.
# rename-command FLUSHALL ""
# rename-command CONFIG ""
