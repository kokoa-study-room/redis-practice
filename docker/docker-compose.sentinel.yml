# ==============================================================================
# Redis Sentinel 실습용 Compose
# ------------------------------------------------------------------------------
# 구성: master 1 + replica 2 + sentinel 3
# 포트:
#   - master:    127.0.0.1:6379
#   - replica-1: 127.0.0.1:6380
#   - replica-2: 127.0.0.1:6381
#   - sentinel-1/2/3: 26379/26380/26381
#
# 사용법:
#   docker compose -f docker/docker-compose.sentinel.yml up -d
#   docker exec sentinel-1 redis-cli -p 26379 SENTINEL GET-MASTER-ADDR-BY-NAME mymaster
#
#   # failover 시연
#   docker compose -f docker/docker-compose.sentinel.yml stop redis-master
#   # ~5초 후 다시 GET-MASTER-ADDR-BY-NAME → 새 master 확인
#
# 주의: docs/06-replication-ha/02-sentinel.md 와 함께 학습하면 가장 효과적.
# ==============================================================================

name: redis-sentinel-learning

x-sentinel-common: &sentinel-common
  image: redis:8.6-alpine
  restart: unless-stopped
  networks: [ sentinel-net ]

services:
  redis-master:
    <<: *sentinel-common
    container_name: sentinel-master
    command: >
      redis-server
        --port 6379
        --appendonly no
        --save ""
    ports: [ "127.0.0.1:6379:6379" ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5

  redis-replica-1:
    <<: *sentinel-common
    container_name: sentinel-replica-1
    command: >
      redis-server
        --port 6379
        --replicaof redis-master 6379
        --appendonly no
        --save ""
    ports: [ "127.0.0.1:6380:6379" ]
    depends_on:
      redis-master: { condition: service_healthy }

  redis-replica-2:
    <<: *sentinel-common
    container_name: sentinel-replica-2
    command: >
      redis-server
        --port 6379
        --replicaof redis-master 6379
        --appendonly no
        --save ""
    ports: [ "127.0.0.1:6381:6379" ]
    depends_on:
      redis-master: { condition: service_healthy }

  # ---- Sentinel 3대 ----
  # sentinel.conf 는 컨테이너 시작 시 sh -c 로 동적 작성
  # (host name 기반이므로 같은 conf 파일을 3개가 공유 가능)
  sentinel-1:
    <<: *sentinel-common
    container_name: sentinel-1
    command: >
      sh -c '
      cat <<EOF > /etc/sentinel.conf
      port 26379
      sentinel monitor mymaster redis-master 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 60000
      sentinel parallel-syncs mymaster 1
      EOF
      redis-server /etc/sentinel.conf --sentinel
      '
    ports: [ "127.0.0.1:26379:26379" ]
    depends_on:
      redis-master: { condition: service_healthy }

  sentinel-2:
    <<: *sentinel-common
    container_name: sentinel-2
    command: >
      sh -c '
      cat <<EOF > /etc/sentinel.conf
      port 26379
      sentinel monitor mymaster redis-master 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 60000
      sentinel parallel-syncs mymaster 1
      EOF
      redis-server /etc/sentinel.conf --sentinel
      '
    ports: [ "127.0.0.1:26380:26379" ]
    depends_on:
      redis-master: { condition: service_healthy }

  sentinel-3:
    <<: *sentinel-common
    container_name: sentinel-3
    command: >
      sh -c '
      cat <<EOF > /etc/sentinel.conf
      port 26379
      sentinel monitor mymaster redis-master 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 60000
      sentinel parallel-syncs mymaster 1
      EOF
      redis-server /etc/sentinel.conf --sentinel
      '
    ports: [ "127.0.0.1:26381:26379" ]
    depends_on:
      redis-master: { condition: service_healthy }

networks:
  sentinel-net:
    driver: bridge
