# ==============================================================================
# Redis 학습 프로젝트 - 기본 Compose 파일
# ------------------------------------------------------------------------------
# 목적: 한 줄 명령으로 Redis + RedisInsight(GUI) 학습 환경을 띄운다.
#
# 사용법:
#   docker compose up -d           # 백그라운드 실행
#   docker compose logs -f redis   # 로그 보기
#   docker compose down            # 종료 (데이터는 ./redis/data 에 보존)
#   docker compose down -v         # 종료 + 모든 볼륨 삭제 (초기화)
#
# 접속:
#   - Redis CLI:     docker compose exec redis redis-cli
#   - 호스트 CLI:    redis-cli -h 127.0.0.1 -p 6379  (호스트에 redis-cli 설치 시)
#   - RedisInsight:  http://localhost:5540  (브라우저 접속)
#
# 검증된 정보 (2026-04 기준):
#   - Redis 8.6.2 = 최신 stable (https://github.com/redis/redis/releases/tag/8.6.2)
#   - redis:8.6-alpine 이미지 = 32.85 MB amd64 (Debian 50.78 MB 대비 가벼움)
#   - RedisInsight 기본 포트 = 5540 (https://hub.docker.com/r/redis/redisinsight)
# ==============================================================================

# Compose 파일 포맷 버전
# 2024-2026 기준으로는 "version" 키를 명시하지 않는 것이 권장 (Compose v2 사용 시)
# 참고: https://docs.docker.com/compose/compose-file/04-version-and-name/

name: redis-learning

services:
  # ----------------------------------------------------------------------------
  # Redis 본체 (Open Source 8.6.x)
  # ----------------------------------------------------------------------------
  redis:
    image: redis:8.6-alpine
    container_name: redis-learning

    # 호스트 포트 6379 → 컨테이너 6379 매핑
    # 학습 환경이므로 안전하게 127.0.0.1(loopback)에만 바인드한다.
    # 외부 IP에 노출하면 인증 없는 Redis가 인터넷에 열리는 사고가 발생할 수 있다.
    # 참고: https://redis.io/docs/latest/operate/oss_and_stack/management/security/
    ports:
      - "127.0.0.1:6379:6379"

    # 학습용 redis.conf 마운트 (read-only)
    # 원본 설정을 컨테이너가 수정할 수 없도록 :ro 옵션을 둔다.
    volumes:
      - ./redis/conf/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./redis/data:/data

    # 컨테이너 시작 시 위 conf 파일을 사용하도록 명시.
    # (이 옵션을 빼면 redis 공식 이미지의 내장 기본값으로 동작한다.)
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

    # Healthcheck: PING 응답이 PONG이면 healthy.
    # docker compose ps에서 (healthy) 표시가 뜨면 정상.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

    networks:
      - redis-net

    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # RedisInsight (Redis 공식 GUI)
  # ----------------------------------------------------------------------------
  # - 키 브라우저 / CLI / Workbench / Profiler / Memory Analysis 등 제공
  # - http://localhost:5540 으로 접속 후 "Add Database" → 호스트 redis, 포트 6379
  #   (컨테이너 간 통신: host=redis, port=6379)
  # ----------------------------------------------------------------------------
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight-learning

    ports:
      - "127.0.0.1:5540:5540"

    # RedisInsight의 SQLite DB(연결 정보, 워크북 히스토리 등)를 영구화
    volumes:
      - redisinsight-data:/data

    # 환경변수로 redis 컨테이너를 자동 등록 (학습자 편의).
    # RI_REDIS_HOST/PORT 변수를 주면 RedisInsight가 시작 시 자동 연결을 추가한다.
    # 참고: https://hub.docker.com/r/redis/redisinsight (Preconfigure database connections)
    environment:
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: 6379
      RI_REDIS_ALIAS: "redis-learning (compose)"

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - redis-net

    restart: unless-stopped

# ------------------------------------------------------------------------------
# 네트워크
# ------------------------------------------------------------------------------
# 컨테이너끼리 호스트명(redis, redisinsight)으로 통신하기 위한 사용자 정의 브리지.
# 기본 bridge 네트워크와 달리 DNS 기반 자동 디스커버리가 동작한다.
networks:
  redis-net:
    driver: bridge

# ------------------------------------------------------------------------------
# 볼륨
# ------------------------------------------------------------------------------
# RedisInsight의 사용자 데이터(연결 목록, 워크북 등)를 보존.
# Redis 본체 데이터(./redis/data)는 호스트 바인드 마운트로 따로 관리한다.
volumes:
  redisinsight-data:
    driver: local
