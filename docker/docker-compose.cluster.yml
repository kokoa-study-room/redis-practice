# ==============================================================================
# Redis Cluster 실습용 Compose
# ------------------------------------------------------------------------------
# 구성: 6노드 (3 master + 3 replica), --cluster-enabled yes
# 포트: 7001~7006 (호스트), bus 포트 17001~17006
#
# 사용법:
#   docker compose -f docker/docker-compose.cluster.yml up -d
#
#   # 클러스터 초기화 (한 번만)
#   docker exec cluster-node-1 redis-cli --cluster create \
#     cluster-node-1:7001 cluster-node-2:7002 cluster-node-3:7003 \
#     cluster-node-4:7004 cluster-node-5:7005 cluster-node-6:7006 \
#     --cluster-replicas 1 --cluster-yes
#
#   # 사용
#   redis-cli -c -p 7001 SET foo bar
#   redis-cli -c -p 7001 CLUSTER NODES
#
#   # 재샤딩
#   docker exec cluster-node-1 redis-cli --cluster reshard 127.0.0.1:7001
#
# 주의: docs/06-replication-ha/03-cluster.md 와 함께 학습.
# ==============================================================================

name: redis-cluster-learning

x-cluster-common: &cluster-common
  image: redis:8.6-alpine
  restart: unless-stopped
  networks: [ cluster-net ]

services:
  cluster-node-1:
    <<: *cluster-common
    container_name: cluster-node-1
    command: >
      redis-server
        --port 7001
        --cluster-enabled yes
        --cluster-config-file /data/nodes.conf
        --cluster-node-timeout 5000
        --appendonly yes
        --bind 0.0.0.0
    ports:
      - "127.0.0.1:7001:7001"
      - "127.0.0.1:17001:17001"

  cluster-node-2:
