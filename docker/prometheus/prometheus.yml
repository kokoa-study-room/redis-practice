# ==============================================================================
# Prometheus 설정 — Redis 학습용
# ------------------------------------------------------------------------------
# scrape 대상:
#   - redis-exporter:9121  (Redis 메트릭)
#   - prometheus:9090      (자기 자신 헬스 — 옵션)
#
# 참고: https://prometheus.io/docs/prometheus/latest/configuration/configuration/
# ==============================================================================

global:
  scrape_interval: 5s
  evaluation_interval: 15s
  external_labels:
    monitor: "redis-learning"

scrape_configs:
  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          instance: "redis-mon"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
